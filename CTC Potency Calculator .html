<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金霉素效价计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f5f9ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(33, 150, 243, 0.15);
            width: 100%;
            max-width: 480px;
            padding: 32px;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            color: #1565c0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .header .subtitle {
            color: #64b5f6;
            font-size: 13px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #424242;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e3f2fd;
            border-radius: 12px;
            font-size: 16px;
            color: #212121;
            background: #fafafa;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-group input:focus {
            border-color: #2196f3;
            background: white;
            box-shadow: 0 0 0 4px rgba(33, 150, 243, 0.1);
        }
        .input-group .hint {
            font-size: 12px;
            color: #9e9e9e;
            margin-top: 6px;
        }
        .formula-section {
            background: #f5f9ff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e3f2fd;
        }
        .formula-section .section-title {
            color: #1565c0;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .formula-section .section-title::before {
            content: "⚙️";
        }
        .formula-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .formula-row span {
            color: #616161;
            font-size: 14px;
        }
        .formula-row input {
            width: 100px;
            padding: 10px 12px;
            border: 2px solid #e3f2fd;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            background: white;
            outline: none;
            transition: border-color 0.3s;
        }
        .formula-row input:focus {
            border-color: #2196f3;
        }
        .formula-display {
            background: white;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            font-size: 16px;
            color: #424242;
            border: 1px dashed #bbdefb;
            margin-top: 8px;
        }
        .formula-display .formula-text {
            color: #1565c0;
            font-weight: 600;
            font-size: 18px;
        }
        .btn-calculate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }
        .btn-calculate:active {
            transform: translateY(0);
        }
        .results {
            display: none;
        }
        .results.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-card {
            background: linear-gradient(135deg, #e3f2fd 0%, #f5f9ff 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            border: 1px solid #bbdefb;
        }
        .result-card .result-label {
            color: #546e7a;
            font-size: 13px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-card .result-value {
            color: #1565c0;
            font-size: 28px;
            font-weight: 700;
        }
        .result-card .result-unit {
            color: #64b5f6;
            font-size: 14px;
            margin-left: 4px;
        }
        .result-card.primary {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            border: none;
        }
        .result-card.primary .result-label {
            color: rgba(255,255,255,0.8);
        }
        .result-card.primary .result-value {
            color: white;
        }
        .result-card.primary .result-unit {
            color: rgba(255,255,255,0.7);
        }
        .history-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e3f2fd;
        }
        .history-section h3 {
            color: #1565c0;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #fafafa;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .history-item .time {
            color: #9e9e9e;
        }
        .history-item .data {
            color: #424242;
        }
        .history-item .data strong {
            color: #1565c0;
        }
        .clear-history {
            text-align: center;
            margin-top: 10px;
        }
        .clear-history button {
            background: none;
            border: none;
            color: #9e9e9e;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }
        .clear-history button:hover {
            color: #f44336;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #bdbdbd;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 金霉素效价计算器</h1>
            <div class="subtitle">Chlortetracycline Potency Calculator</div>
        </div>
        
        <div class="input-group">
            <label for="absorbance">吸光度 (A)</label>
            <input type="number" id="absorbance" placeholder="请输入吸光度值，如 0.125" step="0.001" min="0">
            <div class="hint">精确到3位小数，如 0.052、0.125</div>
        </div>
        
        <div class="input-group">
            <label for="dilution">稀释倍数</label>
            <input type="number" id="dilution" value="21.0" step="0.1" min="0.1">
            <div class="hint">默认 21.0，可根据实际实验调整</div>
        </div>
        
        <div class="formula-section">
            <div class="section-title">公式参数设置</div>
            <div class="formula-row">
                <span>单位 =</span>
                <input type="number" id="coefficient" value="3240.2" step="0.1">
                <span>× A</span>
                <input type="number" id="constant" value="-12.8" step="0.1">
            </div>
            <div class="formula-display">
                当前公式：<span class="formula-text" id="formulaText">单位 = 3240.2 × A − 12.8</span>
            </div>
        </div>
        
        <button class="btn-calculate" onclick="calculate()">计算效价</button>
        
        <div class="results" id="results">
            <div class="result-card">
                <div class="result-label">单位（相对值）</div>
                <div>
                    <span class="result-value" id="unitValue">--</span>
                    <span class="result-unit">u/mL</span>
                </div>
            </div>
            
            <div class="result-card primary">
                <div class="result-label">实际效价</div>
                <div>
                    <span class="result-value" id="potencyValue">--</span>
                    <span class="result-unit">u/mL</span>
                </div>
            </div>
        </div>
        
        <div class="history-section" id="historySection" style="display:none;">
            <h3>📋 计算记录</h3>
            <div id="historyList"></div>
            <div class="clear-history">
                <button onclick="clearHistory()">清空记录</button>
            </div>
        </div>
        
        <div class="footer">
            标曲公式有效期到期后请及时更新
        </div>
    </div>
    
    <script>
        let history = JSON.parse(localStorage.getItem('chrysoHistory') || '[]');
        
        function updateFormula() {
            const coef = document.getElementById('coefficient').value;
            const cons = document.getElementById('constant').value;
            const sign = parseFloat(cons) >= 0 ? '+' : '−';
            const absCons = Math.abs(parseFloat(cons));
            document.getElementById('formulaText').textContent = 
                `单位 = ${coef} × A ${sign} ${absCons}`;
        }
        
        document.getElementById('coefficient').addEventListener('input', updateFormula);
        document.getElementById('constant').addEventListener('input', updateFormula);
        
        function calculate() {
            const aInput = document.getElementById('absorbance').value;
            const dilution = parseFloat(document.getElementById('dilution').value) || 21.0;
            const coefficient = parseFloat(document.getElementById('coefficient').value) || 3240.2;
            const constant = parseFloat(document.getElementById('constant').value) || -12.8;
            
            if (!aInput || isNaN(parseFloat(aInput))) {
                alert('请输入有效的吸光度值');
                return;
            }
            
            let a = parseFloat(aInput);
            a = a + 0.001;
            
            const unit = coefficient * a + constant;
            const potency = unit * dilution;
            
            document.getElementById('unitValue').textContent = unit.toFixed(2);
            document.getElementById('potencyValue').textContent = potency.toFixed(2);
            document.getElementById('results').classList.add('show');
            
            const record = {
                time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
                a: aInput,
                adjustedA: a.toFixed(3),
                dilution: dilution,
                unit: unit.toFixed(2),
                potency: potency.toFixed(2)
            };
            
            history.unshift(record);
            if (history.length > 10) history.pop();
            localStorage.setItem('chrysoHistory', JSON.stringify(history));
            
            renderHistory();
        }
        
        function renderHistory() {
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            section.style.display = 'block';
            list.innerHTML = history.map(item => `
                <div class="history-item">
                    <span class="time">${item.time}</span>
                    <span class="data">
                        A=${item.a}→${item.adjustedA} | 
                        稀释${item.dilution}× | 
                        <strong>${item.potency}</strong> u/mL
                    </span>
                </div>
            `).join('');
        }
        
        function clearHistory() {
            history = [];
            localStorage.removeItem('chrysoHistory');
            renderHistory();
        }
        
        renderHistory();
        
        document.getElementById('absorbance').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculate();
        });
    </script>
</body>
</html>
